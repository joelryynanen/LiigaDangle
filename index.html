<!DOCTYPE html>
<html lang="fi">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta charset="UTF-8">
    <title>LIIGA DANGLE</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Liiga Dangle</h1>

    <div class="info-box">
      <p>  
        Arvaa päivän Liiga-pelaaja!
        Jokainen vastaus antaa sinulle uusia vinkkejä kohti oikeaa vastausta!
        Peli on suomalainen Liigaversio sivun dangle.games NHL-arvuuttelusta!
        Mysteeripelaaja päivittyy joka päivä.
      </p>
    </div>

    <!-- KESKITETTY ARVAUSALUE -->
    <div class="guess-container">
        <input id="guessInput" type="text" placeholder="Arvaa pelaaja">
        <div id="suggestions" class="suggestions-box"></div>
        <button onclick="makeGuess()">Arvaa</button>
    </div>
<div id="guessCounter"></div>
    <div id="guesses"></div>

    <script src="script.js?v=1"></script>

    <div class="info-box">
      <p>
        Kokoonpano päivitetty viimeksi 26.5.2026.
      </p>
    </div>

</body>
</html>
